<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Typing Speed Test</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">
    <h1>Typing Speed Test</h1>
    <p id="high-score" class="high-score"></p>

    <div class="stats">
      <div class="stat">
        <span class="stat-value" id="wpm">0</span>
        <span class="stat-label">WPM</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="accuracy">100%</span>
        <span class="stat-label">Accuracy</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="time">60</span>
        <span class="stat-label">Seconds</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="streak">0</span>
        <span class="stat-label">Best streak</span>
      </div>
    </div>

    <div class="progress-track">
      <div id="progress-bar"></div>
    </div>

    <div id="quote-box"></div>

    <textarea
      id="input-area"
      placeholder="Click here and start typing..."
      spellcheck="false"
    ></textarea>

    <div class="actions">
      <button class="btn primary" id="restart-btn">Restart</button>
      <button class="btn" id="new-btn">New text</button>
      <button class="btn" id="share-btn">Share result</button>
      <select id="difficulty">
        <option value="easy">Easy</option>
        <option value="medium" selected>Medium</option>
        <option value="hard">Hard</option>
        <option value="darija">Darija</option>
      </select>
    </div>

    <div id="result"></div>
  </div>

  <script src="typing-test.js"></script>
</body>
</html>
